version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=verification-service
    volumes:
      - mongodb_data:/data/db

  verification-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/verification-service
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data: